<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>记住你的快乐</title>
    <link rel="stylesheet" href="styles.css?v=20260312-7" />
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true">
      <span class="blob blob-1"></span>
      <span class="blob blob-2"></span>
      <span class="grid"></span>
    </div>

    <header class="site-header">
      <div class="title-wrap">
        <p class="eyebrow">TIME · ARCHIVE</p>
      </div>
    </header>

    <main class="layout">
        <section class="card recommend-card" data-section="recommend">
          <div class="card-title">
            <h2><span class="section-icon icon-recommend" aria-hidden="true"></span>推荐活动</h2>
            <p>保存记录后自动刷新。</p>
          </div>
          <div id="recommendationBox" class="recommendation-box"></div>
        </section>

        <section class="card quick-card">
        <div class="voice-panel">
          <textarea
            id="voiceText"
            rows="2"
            placeholder="例如：16:50~17:55 备菜 快乐3 价值4"
          ></textarea>
          <button id="parseBtn" class="primary">时光存档</button>
        </div>
        </section>

        <section class="card current-card" data-section="current">
          <div class="card-title">
            <h2><span class="section-icon icon-current" aria-hidden="true"></span>当前状态</h2>
            <p>最近 24 小时累积</p>
          </div>
          <div class="current-grid">
            <div class="current-pill">
              <span class="metric-label"><span class="metric-icon joy-icon" aria-hidden="true"></span>当下快乐</span>
              <strong id="currentJoy">0</strong>
            </div>
            <div class="current-pill">
              <span class="metric-label"><span class="metric-icon achievement-icon" aria-hidden="true"></span>长期价值</span>
              <strong id="currentAchievement">0</strong>
            </div>
          </div>
          <p id="currentHint" class="muted"></p>
        </section>

        <section class="card assistant-card" data-section="assistant">
          <div class="card-title">
            <h2><span class="section-icon icon-summary" aria-hidden="true"></span>AI助手</h2>
            <p>可基于你的记录做对话建议。</p>
          </div>
          <div id="aiChatLog" class="ai-chat-log"></div>
          <div class="ai-chat-form">
            <input id="aiChatInput" type="text" placeholder="例如：我现在适合做什么？" />
            <button id="aiChatSend" class="primary">发送</button>
          </div>
        </section>

        <section class="card list-card" data-section="list">
          <div class="card-title card-title-row">
            <div>
              <h2><span class="section-icon icon-list" aria-hidden="true"></span>记录列表</h2>
              <p>按时间倒序排列，可编辑或删除。</p>
            </div>
            <button id="listToggleBtn" class="ghost">收起</button>
          </div>
          <div id="entriesList" class="entries-list"></div>
        </section>
    </main>

    <footer class="site-footer">
      <button id="moreBtn" class="ghost"><span class="button-icon" aria-hidden="true"></span>更多设置</button>
    </footer>

    <div id="toolsModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-content card">
        <div class="modal-head">
          <h2>工具与设置</h2>
          <button id="closeToolsModal" class="ghost">关闭</button>
        </div>
        <div class="tools-list">
          <button id="categoryBtn" class="ghost">分类设置</button>
          <button id="aiSettingsBtn" class="ghost">AI 设置</button>
          <button id="importBtn" class="ghost">导入记录</button>
          <button id="exportBtn" class="ghost">导出记录</button>
          <button id="clearBtn" class="danger">清空记录</button>
        </div>
        <input id="importFile" type="file" accept="application/json" class="is-hidden" />
      </div>
    </div>

    <div id="categoryModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-content card">
        <div class="modal-head">
          <h2>分类规则</h2>
          <button id="closeCategoryModal" class="ghost">关闭</button>
        </div>
        <p class="muted">给每个类别设置关键词，系统会自动匹配活动内容。</p>
        <div id="categoryRulesList" class="rules-list"></div>
        <div class="rules-actions">
          <button id="addCategoryRule" class="ghost">新增类别</button>
          <button id="resetCategoryRules" class="ghost">恢复默认</button>
          <button id="saveCategoryRules" class="primary">保存规则</button>
        </div>
      </div>
    </div>

    <div id="aiModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-content card">
        <div class="modal-head">
          <h2>AI 接入设置</h2>
          <button id="closeAiModal" class="ghost">关闭</button>
        </div>
        <p class="muted">支持 OpenAI 兼容接口（如 DeepSeek / Kimi / SiliconFlow 等）。</p>
        <div class="rules-list ai-form">
          <label>
            <span>启用 AI 推荐</span>
            <select id="aiEnabled">
              <option value="false">关闭</option>
              <option value="true">开启</option>
            </select>
          </label>
          <label>
            <span>接口地址</span>
            <input id="aiBaseUrl" type="text" placeholder="例如：https://api.deepseek.com/v1" />
          </label>
          <label>
            <span>模型名</span>
            <input id="aiModel" type="text" placeholder="例如：deepseek-chat" />
          </label>
          <label>
            <span>API Key</span>
            <input id="aiApiKey" type="password" placeholder="以 sk- 开头" />
          </label>
        </div>
        <div class="rules-actions">
          <button id="saveAiSettings" class="primary">保存 AI 设置</button>
        </div>
      </div>
    </div>

    <script src="app.js?v=20260312-7"></script>
  </body>
</html>
