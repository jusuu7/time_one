<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>记住你的快乐</title>
    <link rel="stylesheet" href="styles.css?v=20260312" />
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true">
      <span class="blob blob-1"></span>
      <span class="blob blob-2"></span>
      <span class="grid"></span>
    </div>

    <header class="site-header">
      <div class="title-wrap">
        <p class="eyebrow">TIME · ARCHIVE</p>
      </div>
    </header>

    <main class="layout">
        <section class="card quick-card">
        <div class="voice-panel">
          <textarea
            id="voiceText"
            rows="2"
            placeholder="例如：16:50~17:40 吃饭 快乐3 成就3"
          ></textarea>
          <button id="parseBtn" class="primary">时光存档</button>
        </div>
        </section>

        <section class="card current-card" data-section="current">
          <div class="card-title">
            <h2>当前状态</h2>
            <p>最近 24 小时累积</p>
          </div>
          <div class="current-grid">
            <div class="current-pill">
              <span>快乐值</span>
              <strong id="currentJoy">0</strong>
            </div>
            <div class="current-pill">
              <span>成就值</span>
              <strong id="currentAchievement">0</strong>
            </div>
          </div>
          <p id="currentHint" class="muted"></p>
        </section>

        <section class="card recommend-card" data-section="recommend">
          <div class="card-title">
            <h2>推荐活动</h2>
            <p>保存记录后自动刷新。</p>
          </div>
          <div id="recommendationBox" class="recommendation-box"></div>
        </section>

        <section class="card summary-card" data-section="summary">
          <div class="card-title">
            <h2>AI 总结</h2>
            <p>基于你最近 7 天的记录自动更新。</p>
          </div>
          <div id="summaryBox" class="summary-box"></div>
        </section>

        <section class="card chart-card" data-section="chart">
          <div class="card-title">
            <h2>每日时间分布</h2>
            <p>查看某一天在各类别上的时间占比。</p>
          </div>
          <div class="chart-header">
            <input type="date" id="chartDate" />
            <span id="chartSummary" class="muted"></span>
          </div>
          <div class="chart-wrap">
            <canvas id="chartCanvas" width="240" height="240"></canvas>
            <div id="chartLegend" class="chart-legend"></div>
          </div>
        </section>

        <section class="card list-card" data-section="list">
          <div class="card-title card-title-row">
            <div>
              <h2>记录列表</h2>
              <p>按时间倒序排列，可编辑或删除。</p>
            </div>
            <button id="listToggleBtn" class="ghost">收起</button>
          </div>
          <div id="entriesList" class="entries-list"></div>
        </section>
    </main>

    <footer class="site-footer">
      <button id="moreBtn" class="ghost">更多设置</button>
    </footer>

    <div id="toolsModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-content card">
        <div class="modal-head">
          <h2>工具与设置</h2>
          <button id="closeToolsModal" class="ghost">关闭</button>
        </div>
        <div class="tools-list">
          <button id="categoryBtn" class="ghost">分类设置</button>
          <button id="importBtn" class="ghost">导入记录</button>
          <button id="exportBtn" class="ghost">导出记录</button>
          <button id="clearBtn" class="danger">清空记录</button>
        </div>
        <input id="importFile" type="file" accept="application/json" class="is-hidden" />
      </div>
    </div>

    <div id="categoryModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-content card">
        <div class="modal-head">
          <h2>分类规则</h2>
          <button id="closeCategoryModal" class="ghost">关闭</button>
        </div>
        <p class="muted">给每个类别设置关键词，系统会自动匹配活动内容。</p>
        <div id="categoryRulesList" class="rules-list"></div>
        <div class="rules-actions">
          <button id="addCategoryRule" class="ghost">新增类别</button>
          <button id="resetCategoryRules" class="ghost">恢复默认</button>
          <button id="saveCategoryRules" class="primary">保存规则</button>
        </div>
      </div>
    </div>

    <script src="app.js?v=20260312"></script>
  </body>
</html>
